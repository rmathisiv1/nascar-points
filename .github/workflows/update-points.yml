name: Update NASCAR Points Data

on:
  schedule:
    # Monday 11:00 UTC (after Sunday Cup/Xfinity) and Thursday 11:00 UTC (catches Truck races)
    - cron: '0 11 * * 1'
    - cron: '0 11 * * 4'
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to refresh'
        required: false
        default: '2026'
      only:
        description: 'Series to refresh (NCS,NOS,NTS or subset)'
        required: false
        default: 'NCS,NOS,NTS'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scripts/scrape_points.py \
            --season "${{ github.event.inputs.season || '2026' }}" \
            --only "${{ github.event.inputs.only || 'NCS,NOS,NTS' }}" \
            --out data/points.json

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/points.json; then
            echo "No changes."
            exit 0
          fi
          git add data/points.json
          git commit -m "chore(data): refresh points.json [skip ci]"
          git push
