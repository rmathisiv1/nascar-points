name: Update NASCAR Points Data

on:
  schedule:
    # All times are in UTC. EST is UTC−5 (no DST handling — during EDT the
    # local clock will run 1 hour later than the labels below).
    # Saturday midnight EST = Saturday 05:00 UTC
    # Sunday   midnight EST = Sunday   05:00 UTC
    # Monday   7:00 AM  EST = Monday   12:00 UTC
    - cron: '0 5  * * 6'
    - cron: '0 5  * * 0'
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to refresh'
        required: false
        default: '2026'
      only:
        description: 'Series to refresh (NCS,NOS,NTS or subset)'
        required: false
        default: 'NCS,NOS,NTS'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
          ONLY:   ${{ github.event.inputs.only   || 'NCS,NOS,NTS' }}
        run: |
          python scripts/scrape_points.py \
            --season "$SEASON" \
            --only "$ONLY" \
            --out "data/points_${SEASON}.json"

      - name: Commit & push if changed
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet "data/points_${SEASON}.json"; then
            echo "No changes."
            exit 0
          fi
          git add "data/points_${SEASON}.json"
          git commit -m "chore(data): refresh points_${SEASON}.json [skip ci]"
          git push
