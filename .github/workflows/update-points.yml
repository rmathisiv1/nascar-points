name: Update NASCAR Points Data

on:
  schedule:
    # All times are in UTC. EST is UTC−5 (no DST handling — during EDT the
    # local clock will run 1 hour later than the labels below).
    # Saturday midnight EST = Saturday 05:00 UTC
    # Sunday   midnight EST = Sunday   05:00 UTC
    # Monday   7:00 AM  EST = Monday   12:00 UTC
    - cron: '0 5  * * 6'
    - cron: '0 5  * * 0'
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to refresh'
        required: false
        default: '2026'
      only:
        description: 'Series to refresh (NCS,NOS,NTS or subset)'
        required: false
        default: 'NCS,NOS,NTS'
      skip_bios:
        description: 'Skip driver bio scrape'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      # --- 1. Main points scrape (results + inline CC fetch) ---
      - name: Run points scraper
        id: points
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
          ONLY:   ${{ github.event.inputs.only   || 'NCS,NOS,NTS' }}
        run: |
          python scripts/scrape_points.py \
            --season "$SEASON" \
            --only "$ONLY" \
            --out "data/points_${SEASON}.json"

      # --- 2. CC self-heal — catches any CC pages the inline scrape missed.
      # Idempotent: only fetches races where crew_chief is still null.
      # Non-fatal — a hiccup here shouldn't block the commit of good points
      # data from step 1.
      - name: CC self-heal backfill
        if: success()
        continue-on-error: true
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
        run: |
          python scripts/backfill_crew_chiefs.py --year "$SEASON" --sleep 0.3

      # --- 3. Driver bios scrape (independent of points file) ---
      - name: Scrape driver bios
        if: github.event.inputs.skip_bios != 'true'
        continue-on-error: true
        run: |
          python scripts/scrape_drivers.py \
            --keys "data/driver_keys.json" \
            --out  "data/drivers.json"

      # --- 4. Commit & push whatever changed ---
      - name: Commit & push if changed
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage anything that may have changed across the three steps.
          # `git add -A` on these specific paths handles new + modified.
          git add "data/points_${SEASON}.json" data/drivers.json 2>/dev/null || true

          # Use --cached so we detect staged changes including new files.
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git diff --cached --stat
          git commit -m "chore(data): weekly refresh ${SEASON} [skip ci]"
          git push
