name: Update NASCAR Results (NASCAR feed)

# Fills completed-race results into data/points_<season>.json from NASCAR's own
# cf.nascar.com feed. Unlike the Racing-Reference points scraper, this source
# does NOT block GitHub's cloud IPs, so it runs reliably here — no local machine
# needed. It only adds results to races that just ran; it never rebuilds the
# schedule, and standings are summed by the frontend from race_pts.
#
# This replaces the *results* half of the old local update.ps1 / update-points.yml.
# (Driver bios are separate — see update-drivers.yml.)
#
# Scheduling: there's no way for cron to read schedule.json and fire exactly at
# each race's finish — cron is fixed UTC. But it doesn't need to. Results don't
# exist in the feed until a race actually ends, and this scraper only fills empty
# slots and only commits when something changed. So a frequent run is "event-timed"
# by nature: it grabs results on the first pass after the checkered flag and
# no-ops otherwise (same self-gating trick the lineups workflow uses). Hence a
# daily 8 PM ET catch-all plus an hourly sweep across Sat & Sun race windows.

on:
  schedule:
    # All times UTC, labels in ET (EDT = UTC-4). Results fire on the :00 mark;
    # every other workflow is offset to :15/:30 so git pushes never collide.
    - cron: '0 12 * * 1-5'     # Mon–Fri 8:00 AM ET — weekday baseline
    # Friday 4 PM ET -> Sat 2 AM ET, hourly:
    - cron: '0 20-23 * * 5'    # Fri 4–7 PM ET
    - cron: '0 0-6 * * 6'      # Fri 8 PM – Sat 2 AM ET (UTC Sat 00–06)
    # Saturday 8 AM ET -> Sun 2 AM ET, hourly (skips 13:00 UTC so Sat clears Schedule):
    - cron: '0 12,14-23 * * 6' # Sat 8 AM – 7 PM ET
    - cron: '0 0-6 * * 0'      # Sat 8 PM – Sun 2 AM ET (UTC Sun 00–06)
    # Sunday: once at 8 AM, then 4 PM ET -> Mon 2 AM ET hourly:
    - cron: '0 12 * * 0'       # Sun 8:00 AM ET
    - cron: '0 20-23 * * 0'    # Sun 4–7 PM ET
    - cron: '0 0-6 * * 1'      # Sun 8 PM – Mon 2 AM ET (UTC Mon 00–06)
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to refresh'
        required: false
        default: '2026'
      only:
        description: 'Series (NCS,NOS,NTS or subset)'
        required: false
        default: 'NCS,NOS,NTS'
      force:
        description: 'Refill races that already have results'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fill results from NASCAR feed
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
          ONLY:   ${{ github.event.inputs.only   || 'NCS,NOS,NTS' }}
          FORCE:  ${{ github.event.inputs.force  || 'false' }}
        run: |
          ARGS="--season \"$SEASON\" --only \"$ONLY\" --out \"data/points_${SEASON}.json\""
          if [ "$FORCE" = "true" ]; then ARGS="$ARGS --force"; fi
          eval python scripts/scrape_results_nascar.py $ARGS

      - name: Commit & push if changed
        env:
          SEASON: ${{ github.event.inputs.season || '2026' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/points_${SEASON}.json" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No results changes."
            exit 0
          fi
          git diff --cached --stat
          git commit -m "chore(results): NASCAR-feed refresh ${SEASON} [skip ci]"
          git push
