name: update-lineups

# Auto-discover the STARTROW starting lineup once qualifying posts it. The
# scraper is self-gating: it probes for {docid}_STARTROW.pdf and no-ops when it
# isn't up yet, so running hourly on race weekends just grabs the grid on the
# first pass after qualifying and quietly does nothing otherwise. Cheap.
on:
  schedule:
    # ET labels (EDT = UTC-4). Overlapping windows sit on the :30 mark so they
    # never collide with the Results sweep (:00); the isolated Sun 3 AM grab
    # stays on the hour. Scraper self-gates (no-ops until STARTROW posts).
    - cron: "30 14-22 * * 5"  # Fri 10 AM – 6 PM ET, hourly
    - cron: "30 14-23 * * 6"  # Sat 10 AM – 7 PM ET   (Sat 10 AM -> 10 PM, hourly)
    - cron: "30 0-2 * * 0"    # Sat 8 – 10 PM ET      (UTC Sun 00–02)
    - cron: "0 7 * * 0"       # Sun 3:00 AM ET
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: update-lineups
  cancel-in-progress: false

jobs:
  lineups:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Discover + scrape STARTROW lineups
        run: python scripts/scrape_lineup.py --current

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/lineups.json)" ]]; then
            git add data/lineups.json
            git commit -m "Auto: starting lineups ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No lineup changes — nothing to commit."
          fi
